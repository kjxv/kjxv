<header class="site-header" role="banner" aria-label="site header" style="border-top:0 !important;">
  <style>
    /* 移除任何多余的顶线/伪元素 */
    .site-header, .site-header::before, .site-header::after,
    .site-header-inner, .site-header-inner::before, .site-header-inner::after {
      border-top: 0 !important;
      box-shadow: none !important;
      background-repeat: no-repeat !important;
    }

    /* 在 header 本身添加通长的底部分隔线（保证跨整页） */
    .site-header {
      border-bottom: 1px solid #e6e6e6;
    }

    /* 移除 wrapper 上可能存在的短下划线（只在 header 显示通长线） */
    .site-header .wrapper { border-bottom: 0 !important; }

    /* 隐藏可能出现在链接或标题上的伪元素导致短线 */
    .site-title a::after,
    .site-title::after,
    .top-links a::after,
    .top-links::before,
    .top-links::after {
      display: none !important;
      content: none !important;
    }

    /* 移除链接自身的下边框/阴影 */
    .top-links a,
    .top-links .home-link,
    .top-links .toc-link {
      border: none !important;
      border-bottom: none !important;
      box-shadow: none !important;
      text-decoration: none !important;
    }

    /* 链接字体样式（保持你之前的要求：放大一号） */
    .top-links .home-link,
    .top-links .toc-link {
      font-size: 1.5rem !important;
      line-height: 1 !important;
      font-weight: 700 !important;
      color: inherit !important;
      text-decoration: none !important;
      padding-bottom: 10px; /* 给链接与底线留出垂直间距，让线在链接下方整齐显示 */
    }

    @media (max-width: 640px) {
      .top-links { flex-direction: column; gap: 8px; align-items: stretch; }
      .top-links a { text-align: center; }
      .top-links .home-link, .top-links .toc-link { font-size: 1.2rem !important; padding-bottom: 6px; }
    }
  </style>

  <div class="wrapper">
    <div class="top-links" style="display:flex; justify-content:space-between; align-items:center; padding:12px 0;">
      <a class="home-link" href="https://www.youtube.com/@%E7%A7%91%E6%8A%80%E5%B0%8FV" target="_blank" rel="noopener noreferrer">
        科技小V 首页入口
      </a>

      <a class="toc-link" href="{{ site.baseurl | default: '/' }}">
        返回目录
      </a>
    </div>
  </div>
</header>
