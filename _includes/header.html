<header class="site-header" role="banner" aria-label="site header" style="border-top:0 !important;">
  <!-- 引入你已创建的全局样式文件 -->
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

  <style>
    /* 覆盖可能来自主题的短下划线 / 伪元素，保留通长底线 */
    .site-header, .site-header::before, .site-header::after,
    .site-header-inner, .site-header-inner::before, .site-header-inner::after {
      border-top: 0 !important;
      box-shadow: none !important;
      background-repeat: no-repeat !important;
    }

    /* 通长底线放在 header 本身，wrapper 不再有 border */
    .site-header { border-bottom: 1px solid #e6e6e6; }
    .site-header .wrapper { border-bottom: 0 !important; }

    /* 隐藏可能出现在链接或标题上的伪元素（避免短线） */
    .site-title a::after,
    .site-title::after,
    .top-links a::after,
    .top-links::before,
    .top-links::after {
      display: none !important;
      content: none !important;
    }

    /* 移除链接自身的下边框/阴影 */
    .top-links a,
    .top-links .home-link,
    .top-links .toc-link {
      border: none !important;
      border-bottom: none !important;
      box-shadow: none !important;
      text-decoration: none !important;
      color: inherit !important;
      background: transparent !important;
    }

    /* 字体大小（按你指定的比例） */
    .top-links .home-link { /* 主入口：28px */
      font-size: 28px !important;
      line-height: 1.1 !important;
      font-weight: 700 !important;
      padding-bottom: 10px;
    }

    .top-links .toc-link { /* 辅助按钮：18px */
      font-size: 18px !important;
      line-height: 1.1 !important;
      font-weight: 600 !important;
      padding-bottom: 10px;
    }

    /* 布局：与正文 wrapper 宽度对齐，左右各自对齐 */
    .site-header .wrapper { max-width: 980px; margin: 0 auto; padding: 12px; }
    .top-links { display:flex; justify-content:space-between; align-items:center; }

    /* 响应式：窄屏时堆叠并适当缩小 */
    @media (max-width: 640px) {
      .site-header .wrapper { padding: 8px 12px; }
      .top-links { flex-direction: column; gap: 8px; align-items: stretch; }
      .top-links .home-link { font-size: 20px !important; padding-bottom:6px; text-align:center; }
      .top-links .toc-link  { font-size: 16px !important; padding-bottom:6px; text-align:center; }
    }
  </style>

  <div class="wrapper">
    <div class="top-links" role="navigation" aria-label="site navigation">
      <!-- 左侧：YouTube 频道入口 -->
      <a class="home-link" href="https://www.youtube.com/@%E7%A7%91%E6%8A%80%E5%B0%8FV" target="_blank" rel="noopener noreferrer">
        YouTube 频道入口
      </a>

      <!-- 右侧：返回目录 -->
      <a class="toc-link" href="{{ site.baseurl | default: '/' }}">
        返回目录
      </a>
    </div>
  </div>
</header>
