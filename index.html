---
layout: default
title: "教程目录"
---

<!-- 页面专用样式：标题与列表字号按你的要求设置 -->
<style>
  .toc-container .toc-heading {
    font-size: 22px;       /* 二级标题：20-22px，设为22px */
    font-weight: 700;
    line-height: 1.2;
    margin: 0 0 1.5rem;
  }

  .toc-container .toc-list {
    list-style: disc;
    margin: 0 0 1.75rem 1.25rem;
    padding: 0;
  }

  .toc-container .toc-list li {
    margin: 0 0 0.9rem 0;
    line-height: 1.6;      /* 适度行高，阅读舒适 */
  }

  .toc-container .toc-list li a {
    font-size: 16px;       /* 列表项：14-16px，设为16px */
    line-height: 1.6;
    text-decoration: none;
    color: inherit;
  }

  .toc-container .toc-list li a:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    .toc-container .toc-heading { font-size: 20px; }
    .toc-container .toc-list li a { font-size: 14px; }
    .toc-container .toc-list li { margin-bottom: 0.75rem; line-height: 1.4; }
  }
</style>

<div class="toc-container">
  <h1 class="toc-heading">教程目录</h1>

  <ul class="toc-list">
    {% assign tutorials = site.pages | where: "category", "tutorial" | sort: "title" %}
    {% for t in tutorials %}
      {% if t.url != "/" %}
        {% if t.external_url %}
          <li><a href="{{ t.external_url }}" target="_blank" rel="noopener noreferrer">{{ t.title }}</a></li>
        {% else %}
          <li><a href="{{ t.url | relative_url }}">{{ t.title }}</a></li>
        {% endif %}
      {% endif %}
    {% endfor %}
  </ul>
</div>
