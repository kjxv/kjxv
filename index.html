# 教程目录

<ul>
  {% assign tutorials = site.pages | where: "category", "tutorial" | sort: "title" %}
  {% for t in tutorials %}
    {% if t.url != "/" %}
      {% if t.external_url %}
        <!-- 如果页面 front matter 有 external_url，就跳到外部地址（新标签） -->
        <li><a href="{{ t.external_url }}" target="_blank" rel="noopener noreferrer">{{ t.title }}</a></li>
      {% else %}
        <!-- 否则跳到站内页面（使用 relative_url 以确保 baseurl 正确） -->
        <li><a href="{{ t.url | relative_url }}">{{ t.title }}</a></li>
      {% endif %}
    {% endif %}
  {% endfor %}
</ul>
